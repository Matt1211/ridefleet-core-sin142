info:
  name: Listar Corridas
  type: http
  seq: 2

http:
  method: GET
  url: "{{CORE_HOST}}/rides"
  headers:
    - name: X-API-Key
      value: "{{API_KEY}}"
  params:
    - name: originServiceId
      value: group-daacbasd
      enabled: false
    - name: assignedServiceId
      value: group-b
      enabled: false
    - name: state
      value: request
      enabled: false
    - name: limit
      value: "50"
      enabled: true
    - name: offset
      value: "0"
      enabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
