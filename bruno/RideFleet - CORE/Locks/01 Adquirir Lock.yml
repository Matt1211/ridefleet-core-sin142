info:
  name: Adquirir Lock
  type: http
  seq: 1

http:
  method: POST
  url: "{{CORE_HOST}}/locks/{{RIDE_UUID}}"
  headers:
    - name: X-API-Key
      value: "{{API_KEY}}"
  body:
    type: json
    data: |-
      {
        "serviceId": "group-daacbasd",
        "ttlSeconds": 30
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
