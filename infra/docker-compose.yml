version: "3.9"

# Docker Compose completo — core + todos os serviços de grupos.
# Cada grupo deve adicionar seu serviço neste arquivo (ou usar extends).
#
# Uso: docker compose -f infra/docker-compose.yml up -d
#
# Para subir apenas o core + observabilidade:
#   docker compose -f infra/docker-compose.core.yml up -d

include:
  - docker-compose.core.yml

# ---------------------------------------------------------------------------
# Serviço do grupo cliente — descomente e ajuste para integrar com o core.
#
# Como usar:
#   1. Descomente o bloco abaixo.
#   2. Substitua "../meu-servico" pelo path relativo ao repo do seu grupo.
#   3. Ajuste a porta externa (8081) se necessário.
#   4. Suba tudo: docker compose -f infra/docker-compose.yml up -d
#
# Seu serviço receberá callbacks do core via nome do container na ridefleet-net:
#   POST http://meu-servico:8080/rides/incoming   ← leilão
#   POST http://meu-servico:8080/rides/{id}/assigned  ← resultado
#
# Ao iniciar, registre-se no core (idempotente — seguro em qualquer restart):
#   POST http://core:8080/api/v1/groups/register
#   { "groupId": "meu-grupo", "groupName": "...", "serviceUrl": "http://meu-servico:8080" }
#
# Ver docs/onboarding.md para o passo-a-passo completo.
# ---------------------------------------------------------------------------

# services:
#
#   meu-servico:
#     build:
#       context: ../meu-servico   # ← path para o repo do seu grupo
#       dockerfile: Dockerfile
#     container_name: ridefleet-meu-servico
#     ports:
#       - "8081:8080"             # ← porta acessível no host (ajuste se colidir)
#     environment:
#       - CORE_URL=http://core:8080/api/v1
#       - GROUP_ID=meu-grupo      # ← groupId que seu serviço usa ao se registrar
#     depends_on:
#       core:
#         condition: service_healthy
#     networks:
#       - ridefleet-net
