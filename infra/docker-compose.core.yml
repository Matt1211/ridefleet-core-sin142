version: "3.9"

# Docker Compose do core — sobe o core + observabilidade.
# Uso: docker compose -f infra/docker-compose.core.yml up -d --build
# Nota: Use --build para garantir que a imagem seja construída do source atual,
# evitando problemas com imagens pré-compiladas obsoletas.

services:

  db:
    image: postgres:16-alpine
    container_name: ridefleet-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ridefleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ridefleet_core
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridefleet -d ridefleet_core"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ridefleet-db-data:/var/lib/postgresql/data
    networks:
      - ridefleet-net

  core:
    build:
      context: ..
      dockerfile: app/Dockerfile
      target: base
    image: ridefleet-core:latest
    container_name: ridefleet-core
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-ridefleet}:${RABBITMQ_PASSWORD:-ridefleet}@rabbitmq:5672/
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-ridefleet.core.events}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ridefleet}:${POSTGRES_PASSWORD:-secret}@db:5432/ridefleet_core
      - CORE_ENV=${CORE_ENV:-development}
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/v1/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ridefleet-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ridefleet-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ridefleet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ridefleet}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ridefleet-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ridefleet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - core
    networks:
      - ridefleet-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ridefleet-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-ridefleet}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ridefleet-net

networks:
  ridefleet-net:
    driver: bridge

volumes:
  ridefleet-db-data:
  grafana-data:
