version: "3.9"

# Docker Compose para desenvolvimento local.
# Sobe o PostgreSQL (localhost:5432) e o RabbitMQ (localhost:5672 / UI: 15672).
# O servidor FastAPI roda fora do Docker (make dev / uvicorn --reload).
#
# Uso direto: docker compose -f infra/docker-compose.dev.yml up -d
# Via Makefile: make db-up

services:

  db:
    image: postgres:16-alpine
    container_name: ridefleet-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ridefleet
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ridefleet_core
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridefleet -d ridefleet_core"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ridefleet-db-data:/var/lib/postgresql/data
    networks:
      - ridefleet-dev

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ridefleet-rabbitmq-dev
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ridefleet
      RABBITMQ_DEFAULT_PASS: ridefleet
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ridefleet-dev

networks:
  ridefleet-dev:
    driver: bridge

volumes:
  ridefleet-db-data:
