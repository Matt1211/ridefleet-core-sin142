# Definição de tópicos pub/sub do RideFleet Core
#
# Broker: RabbitMQ 3.13 — exchange topic "ridefleet.core.events"
# Filas declaradas automaticamente em app/rabbitmq.py na inicialização do Core.

topics:

  ride_created:
    queue: ridefleet.groups.ride_created
    routing_key: ride_created
    description: >
      Publicado pelo auction worker no início de cada leilão.
      Grupos podem assinar para observabilidade/logging.
      A participação no leilão é feita via callback HTTP (POST /rides/incoming), não por esta fila.
    publisher: core (auction_worker)
    subscribers: [all_groups]
    payload_schema: spec/schemas/ride-request.json
    retention: "1h"

  proposal_submitted:
    queue: ridefleet.proposals
    routing_key: proposal_submitted
    description: >
      Publicado pelo core quando uma proposta é registrada no leilão.
    publisher: core
    subscribers: [origin_service]
    payload_schema: spec/schemas/ride-proposal.json
    retention: "1h"

  ride_status_changed:
    queue: ridefleet.groups.status
    routing_key: ride_status_changed
    description: >
      Publicado pelo core a cada transição de estado da saga.
      Todos os grupos recebem atualizações de estado.
    publisher: core
    subscribers: [all_groups]
    payload_schema: spec/schemas/ride-status.json
    retention: "24h"

  lock_event:
    queue: ridefleet.locks
    routing_key: lock_event
    description: >
      Publicado pelo core em eventos de lock: aquisição, liberação e expiração.
      Útil para observabilidade e detecção de contenção.
    publisher: core
    subscribers: [core_internal, observability]
    retention: "1h"

  compensation_triggered:
    queue: ridefleet.compensations
    routing_key: compensation_triggered
    description: >
      Publicado pelo lock_monitor quando uma compensação é iniciada (lock expirado).
      Grupos envolvidos devem reverter suas ações locais.
    publisher: core (lock_monitor)
    subscribers: [assigned_service, origin_service]
    retention: "24h"

  auction_request:
    queue: ridefleet.auction.requests
    routing_key: auction_request
    description: >
      Dispara a execução de um leilão pelo auction_worker interno.
      Consumido exclusivamente pelo Core — grupos não devem assinar esta fila.
    publisher: core
    subscribers: [core_internal (auction_worker)]
    retention: "1h"
