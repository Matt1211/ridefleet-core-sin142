global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "ridefleet"
    env: "development"

scrape_configs:

  - job_name: "ridefleet-core"
    static_configs:
      - targets: ["core:8080"]
    metrics_path: /metrics

  # ── Grupos registrados ────────────────────────────────────────────────────
  - job_name: "ridefleet-group"
    static_configs:
      - targets: ["nginx:80"]
        labels:
          group: "ridefleet-group"
          group_name: "RideFleet AllWays"
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
