name: Lint and Validate

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências de lint
        run: pip install ruff

      - name: Lint code
        run: ruff check app/

  test:
    name: Testes (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r app/requirements.txt pytest pytest-asyncio httpx aiosqlite

      - name: Executar testes
        run: pytest app/tests/ -v

  lint-spec:
    name: Lint OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Lint spec/api/openapi.yaml
        run: spectral lint spec/api/openapi.yaml

  validate-schemas:
    name: Validar JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar jsonschema
        run: pip install jsonschema

      - name: Validar schemas (draft 2020-12)
        run: |
          python3 - <<'EOF'
          import json, glob, sys
          from jsonschema import Draft202012Validator

          for path in sorted(glob.glob('spec/schemas/*.json')):
              schema = json.load(open(path))
              try:
                  Draft202012Validator.check_schema(schema)
                  print(f'OK  {path}')
              except Exception as e:
                  print(f'FAIL {path}: {e}')
                  sys.exit(1)
          EOF
