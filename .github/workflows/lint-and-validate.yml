name: Lint and Validate

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências de lint
        run: pip install ruff

      - name: Lint code
        run: ruff check app/

  test:
    name: Testes (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install -r app/requirements.txt

      - name: Executar testes
        run: pytest app/tests/ -v

  lint-spec:
    name: Lint OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Lint spec/api/openapi.yaml
        run: spectral lint spec/api/openapi.yaml

  validate-schemas:
    name: Validar JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Compilar schemas
        run: |
          for schema in spec/schemas/*.json; do
            echo "Compilando $schema..."
            ajv compile -s "$schema"
          done
